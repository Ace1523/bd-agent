<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BD Agent — McChrystal Group</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="topnav">
    <div class="nav-brand">
      <span class="brand-icon">&#9670;</span>
      <span class="brand-text">McChrystal Group BD Agent</span>
    </div>
    <button class="hamburger" id="hamburger" aria-label="Menu">&#9776;</button>
    <div class="nav-tabs" id="nav-tabs">
      <button class="nav-tab active" data-view="home">Home</button>
      <button class="nav-tab" data-view="pipeline">Pipeline</button>
      <button class="nav-tab" data-view="research">Research</button>
      <button class="nav-tab" data-view="outreach">Outreach</button>
      <button class="nav-tab" data-view="proposals">Proposals</button>
      <button class="nav-tab" data-view="how-it-works">How It Works</button>
      <button class="nav-tab" data-view="future">Future</button>
    </div>
    <div class="nav-search">
      <input type="text" id="nav-search-input" placeholder="Search companies..." autocomplete="off">
      <div id="nav-search-results" class="search-results"></div>
    </div>
  </nav>

  <main class="content">
    <div id="view-home" class="view active"></div>
    <div id="view-pipeline" class="view"></div>
    <div id="view-research" class="view"></div>
    <div id="view-outreach" class="view"></div>
    <div id="view-proposals" class="view"></div>
    <div id="view-how-it-works" class="view"></div>
    <div id="view-future" class="view"></div>
  </main>

  <button class="scroll-top" id="scroll-top" aria-label="Scroll to top">&#9650;</button>
  <div class="toast" id="toast">Copied to clipboard</div>

  <script src="app.js"></script>
</body>
</html>
